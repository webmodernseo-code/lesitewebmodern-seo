<!-- Importation de la police Inter unique -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
        :root {
            --logo-scale: 1.8;
            /* Agrandissement pour la prévisualisation */
            --logo-scale-mobile: 1.2;
            --brand-orange: #CC4E00;
            --brand-orange-light: #F56B22;
            --brand-orange-dark: #803100;
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            position: relative;
        }

        /* --- LOGO 3D CSS --- */
        .logo-scaler {
            transform: scale(var(--logo-scale));
            transform-origin: center center;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .scene-3d {
            width: 100px;
            height: 100px;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateY(25deg) rotateX(8deg);
            animation: float 10s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotateY(25deg) rotateX(8deg);
            }
            50% {
                transform: translateY(-8px) rotateY(18deg) rotateX(14deg);
            }
        }

        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* Styles de la Carte Orange */
        .card-glow {
            fill: var(--brand-orange);
            opacity: 0.22;
            filter: blur(16px) drop-shadow(0 4px 15px rgba(204, 78, 0, 0.25));
        }

        .card-thickness {
            fill: var(--brand-orange-dark);
            opacity: 0.9;
        }

        .card-face {
            fill: url(#card-gradient);
            filter: drop-shadow(0 6px 14px rgba(15, 15, 17, 0.12));
        }

        /* Styles du Logo W */
        .logo-thickness {
            fill: #cbd5e1;
            opacity: 0.8;
        }

        .logo-face {
            fill: url(#logo-gradient);
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.25));
        }

        .logo-glow {
            fill: #ffffff;
            opacity: 0.25;
            filter: blur(2px);
        }

        /* Révélation élégante progressive */
        .logo-part {
            opacity: 0;
            transform-origin: center;
            animation: elegantReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .p1 {
            animation-delay: 0.15s;
        }

        .p2 {
            animation-delay: 0.3s;
        }

        .p3 {
            animation-delay: 0.45s;
        }

        @keyframes elegantReveal {
            0% {
                opacity: 0;
                transform: translateY(15px) scale(0.9);
            }
            100% {
                opacity: 1;
                transform: translateY(0px) scale(1);
            }
        }

        @media (max-width: 768px) {
            .logo-scaler {
                transform: scale(var(--logo-scale-mobile));
            }
        }
    </style>

    <!-- Définitions SVG -->
    <svg width="0" height="0" style="position: absolute;">
        <defs>
            <!-- Dégradé de la carte orange -->
            <linearGradient id="card-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="var(--brand-orange-light)" />
                <stop offset="100%" stop-color="var(--brand-orange)" />
            </linearGradient>

            <!-- Dégradé argenté/blanc du logo W -->
            <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffffff" />
                <stop offset="100%" stop-color="#f1f5f9" />
            </linearGradient>

            <!-- Forme de la Carte (Carré arrondi) -->
            <g id="card-shape">
                <rect x="5" y="5" width="90" height="90" rx="22" />
            </g>

            <!-- Forme du Logo "W" -->
            <g id="logo-shapes">
                <polygon class="logo-part p1" points="20,28 42,28 42,76 25,76 21,58 27,58" />
                <polygon class="logo-part p2" points="58,28 80,28 70,76 58,76" />
                <polygon class="logo-part p3" points="41,66 59,66 50,46" />
            </g>
        </defs>
    </svg>

    <!-- Conteneur du Logo -->
    <a href="#" class="logo">
        <div class="logo-scaler">
            <div class="scene-3d">
                <!-- 1. Couches de la Carte Orange (3D en arrière-plan) -->
                <svg class="layer card-glow" style="transform: translateZ(-16px)">
                    <use href="#card-shape" />
                </svg>
                <svg class="layer card-thickness" style="transform: translateZ(-14px)">
                    <use href="#card-shape" />
                </svg>
                <svg class="layer card-thickness" style="transform: translateZ(-12px)">
                    <use href="#card-shape" />
                </svg>
                <svg class="layer card-thickness" style="transform: translateZ(-10px)">
                    <use href="#card-shape" />
                </svg>
                <svg class="layer card-thickness" style="transform: translateZ(-8px)">
                    <use href="#card-shape" />
                </svg>
                <svg class="layer card-face" style="transform: translateZ(-6px)">
                    <use href="#card-shape" />
                </svg>

                <!-- 2. Couches du Logo W (3D flottant au-dessus) -->
                <svg class="layer logo-thickness" style="transform: translateZ(-2px)">
                    <use href="#logo-shapes" />
                </svg>
                <svg class="layer logo-thickness" style="transform: translateZ(2px)">
                    <use href="#logo-shapes" />
                </svg>
                <svg class="layer logo-thickness" style="transform: translateZ(6px)">
                    <use href="#logo-shapes" />
                </svg>
                <svg class="layer logo-face" style="transform: translateZ(10px)">
                    <use href="#logo-shapes" />
                </svg>
                <svg class="layer logo-glow" style="transform: translateZ(12px)">
                    <use href="#logo-shapes" />
                </svg>
            </div>
        </div>
    </a>
