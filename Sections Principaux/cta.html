<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- ==========================================================================
       CSS DU COMPOSANT CTA (À copier dans WordPress / Custom CSS ou Elementor)
       ========================================================================== -->
<style>
    :root {
        /* Variables isolées pour le CTA - Inspirées du style premium de Vidsync */
        --wms-cta-bg: linear-gradient(135deg, #faf5eb 0%, #fefcf9 50%, #faf5eb 100%);
        --wms-cta-text-primary: #0f0f11;
        --wms-cta-text-secondary: #5c5c64;
        /* Gris ardoise doux */
        --wms-cta-orange: #E05300;
        /* Orange vif de la marque */
        --wms-cta-orange-light: #FF7A33;
        --wms-cta-black: #0c0c0e;
        /* Noir carbone */
        --wms-cta-border: rgba(15, 15, 17, 0.06);
        /* Bordure très discrète */
        --wms-cta-transition: 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Force la police Inter sur le composant et tous ses enfants */
    .wms-cta-wrapper,
    .wms-cta-wrapper h1,
    .wms-cta-wrapper h2,
    .wms-cta-wrapper h3,
    .wms-cta-wrapper h4,
    .wms-cta-wrapper p,
    .wms-cta-wrapper a,
    .wms-cta-wrapper span {
        font-family: 'Inter', sans-serif !important;
    }

    .wms-cta-wrapper {
        max-width: 1400px;
        width: 100%;
        margin: 0 auto;
        background: var(--wms-cta-bg);
        border: 1px solid var(--wms-cta-border);
        border-radius: 32px;
        padding: 72px 48px;
        text-align: center;
        box-sizing: border-box;
        box-shadow:
            0 15px 35px rgba(15, 15, 17, 0.03),
            0 1px 3px rgba(15, 15, 17, 0.01);
        /* Ombres légères et diffuses */
        position: relative;
        overflow: hidden;
    }

    /* Effet de brillance douce en arrière-plan */
    .wms-cta-wrapper::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        pointer-events: none;
    }

    .wms-cta-title {
        font-size: clamp(2rem, 4vw, 3rem);
        font-weight: 800;
        color: var(--wms-cta-text-primary);
        line-height: 1.15;
        letter-spacing: -0.03em;
        max-width: 800px;
        margin: 0 auto 16px auto;
    }

    .wms-cta-highlight {
        color: var(--wms-cta-orange) !important;
    }

    .wms-cta-subtitle {
        font-size: clamp(1rem, 1.8vw, 1.15rem);
        line-height: 1.6;
        color: var(--wms-cta-text-secondary);
        max-width: 600px;
        margin: 0 auto 36px auto;
        font-weight: 500;
    }

    /* --- CONTENEUR DES BOUTONS --- */
    .wms-cta-actions {
        display: flex;
        gap: 16px;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
    }

    .wms-cta-btn {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 10px 24px 10px 10px;
        border-radius: 14px;
        font-size: 1rem;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
        box-sizing: border-box;
        transition: all var(--wms-cta-transition);
    }

    /* --- BOUTON PRINCIPAL (NOIR CARBON) --- */
    .wms-cta-btn-primary {
        background-color: var(--wms-cta-black) !important;
        color: #ffffff !important;
        border: 1px solid var(--wms-cta-black) !important;
        box-shadow: 0 4px 12px rgba(12, 12, 14, 0.08) !important;
    }

    .wms-cta-btn-primary:hover {
        background-color: #1a1a24 !important;
        border-color: #1a1a24 !important;
        transform: translateY(-2px) !important;
        box-shadow: 0 6px 18px rgba(12, 12, 14, 0.15) !important;
    }

    /* Badge d'icône orange pour le bouton principal */
    .wms-cta-icon-badge-primary {
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        width: 32px !important;
        height: 32px !important;
        border-radius: 10px !important;
        background-color: var(--wms-cta-orange) !important;
        /* Orange uni */
        color: #ffffff !important;
        transition: transform var(--wms-cta-transition) !important;
    }

    .wms-cta-btn-primary:hover .wms-cta-icon-badge-primary {
        transform: translateX(2px) !important;
    }

    /* --- BOUTON SECONDAIRE (CONTOUR BLANC/GRIS) --- */
    .wms-cta-btn-secondary {
        background-color: #ffffff !important;
        color: var(--wms-cta-text-primary) !important;
        border: 1.5px solid rgba(15, 15, 17, 0.12) !important;
        box-shadow: 0 2px 4px rgba(15, 15, 17, 0.02) !important;
    }

    .wms-cta-btn-secondary:hover {
        background-color: #fafafa !important;
        border-color: rgba(15, 15, 17, 0.2) !important;
        transform: translateY(-2px) !important;
        box-shadow: 0 4px 12px rgba(15, 15, 17, 0.05) !important;
    }

    /* Badge d'icône orange pour le bouton secondaire */
    .wms-cta-icon-badge-secondary {
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        width: 32px !important;
        height: 32px !important;
        border-radius: 10px !important;
        background-color: var(--wms-cta-orange) !important;
        /* Orange uni */
        border: none !important;
        color: #ffffff !important;
        box-sizing: border-box !important;
        transition: transform var(--wms-cta-transition) !important;
    }

    .wms-cta-btn-secondary:hover .wms-cta-icon-badge-secondary {
        transform: scale(1.08) !important;
    }

    /* ==========================================================================
           RESPONSIVE MEDIA QUERIES
           ========================================================================== */
    @media (max-width: 768px) {
        .wms-cta-wrapper {
            padding: 50px 24px;
            border-radius: 24px;
        }

        .wms-cta-actions {
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .wms-cta-btn {
            width: auto;
            min-width: auto;
            justify-content: center;
            padding: 10px 24px 10px 10px;
        }
    }
</style>
